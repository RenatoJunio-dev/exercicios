<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
<link rel="estilo/stylesheet" href="style.css">
  <title>Frontend Mentor | QR code component</title>


  <style>

    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    * {
        font-family: Arial, Helvetica, sans-serif, sans-serif;



    }
    body html {
        margin: 0;
        padding: 0;
    }

    body {

        background-image: linear-gradient(to left, hsl(229, 21%, 56%), hsl(229, 39%, 81%));
    }

    main {
        width: 400px;
        height: 600px;
        background-color: white;
        margin: 0 auto;
        text-align: center;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        img {
          width: 100%;
          border-radius: 20px;
h1{

  font-size: 0.5rem;
}

        }
    }
    h1 {
        font-size: 1.5rem;
        margin: 20px 0;
    }
    footer {
        font-size: 0.8rem;
        color: rgb(31, 29, 29);
        margin-top: 20px;
    }

  </style>

</head>
<body>

  <main>

    <img src="./images/image-qr-code.png" alt="QR Code">
    <h1>Improve your front-end skills by building projects</h1>
    Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
  
  
  </main>




  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/RenatoJunio-dev">Renato Junio</a>.
  </footer>
</body>
</html>
